services:
  telegram-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      TELEGRAM_SESSION_DIR: /data/telegram
    ports:
      - "8080:8080"
    volumes:
      - telegram-session-data:/data/telegram
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  telegram-auth:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      TELEGRAM_SESSION_DIR: /data/telegram
    command: ["telegram-proxy-auth"]
    stdin_open: true
    tty: true
    profiles: ["auth"]
    volumes:
      - telegram-session-data:/data/telegram

volumes:
  telegram-session-data:
