services:
  telegram-proxy:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    env_file:
      - .env
    environment:
      PORT: ${PORT:-4040}
      TELEGRAM_SESSION_DIR: /data/telegram
    ports:
      - "${PORT:-4040}:${PORT:-4040}"
    volumes:
      - telegram-session-data:/data/telegram
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, sys, urllib.request; port = os.getenv('PORT', '4040'); sys.exit(0 if urllib.request.urlopen(f'http://localhost:{port}/healthz').status == 200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  telegram-auth:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    env_file:
      - .env
    environment:
      TELEGRAM_SESSION_DIR: /data/telegram
    command: ["telegram-proxy-auth"]
    stdin_open: true
    tty: true
    profiles: ["auth"]
    volumes:
      - telegram-session-data:/data/telegram

volumes:
  telegram-session-data:
